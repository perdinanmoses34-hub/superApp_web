<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with deep premium slate gradient & rounded squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="100" y1="50" x2="400" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>

    <!-- Church Roof & Wall Gradient -->
    <linearGradient id="church-wall-grad" x1="256" y1="120" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Golden Light Window Glow -->
    <linearGradient id="window-glow" x1="256" y1="160" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Sky Light Aura -->
    <radialGradient id="sky-aura" cx="256" cy="180" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glowing Sky Aura Behind Church -->
  <circle cx="256" cy="220" r="180" fill="url(#sky-aura)"/>

  <!-- Decorative Golden Ring -->
  <circle cx="256" cy="256" r="218" stroke="url(#gold-grad)" stroke-width="4" opacity="0.3" stroke-dasharray="10 10"/>
  <circle cx="256" cy="256" r="230" stroke="url(#gold-grad)" stroke-width="2" opacity="0.15"/>

  <!-- CHURCH BUILDING STRUCTURE (GEREJA) -->

  <!-- Outer Wings / Base Church Building -->
  <!-- Left Wing Wall -->
  <path d="M120 280 L190 230 L190 390 L120 390 Z" fill="url(#church-wall-grad)" stroke="url(#gold-grad)" stroke-width="2"/>
  <!-- Right Wing Wall -->
  <path d="M392 280 L322 230 L322 390 L392 390 Z" fill="url(#church-wall-grad)" stroke="url(#gold-grad)" stroke-width="2"/>

  <!-- Left Roof -->
  <path d="M108 285 L190 225 L196 235 L114 295 Z" fill="url(#gold-grad)"/>
  <!-- Right Roof -->
  <path d="M404 285 L322 225 L316 235 L398 295 Z" fill="url(#gold-grad)"/>

  <!-- Central Main Church Body -->
  <path d="M180 220 L256 160 L332 220 L332 390 L180 390 Z" fill="#1E293B" stroke="url(#gold-grad)" stroke-width="3"/>
  <!-- Central Main Roof Trim -->
  <path d="M170 225 L256 155 L342 225 L336 235 L256 170 L176 235 Z" fill="url(#gold-grad)"/>

  <!-- High Steeple Tower (Menara Gereja Tinggi) -->
  <path d="M216 170 L256 80 L296 170 Z" fill="url(#church-wall-grad)" stroke="url(#gold-grad)" stroke-width="3"/>
  <path d="M210 172 L256 75 L302 172 L294 178 L256 90 L218 178 Z" fill="url(#gold-grad)"/>

  <!-- CROSS ON TOP OF TOWER (SALIB EMAN AGUNG) -->
  <!-- Vertical Beam of Cross -->
  <rect x="248" y="25" width="16" height="65" rx="4" fill="url(#gold-grad)"/>
  <!-- Horizontal Beam of Cross -->
  <rect x="232" y="40" width="48" height="15" rx="4" fill="url(#gold-grad)"/>
  <!-- Glowing aura behind cross -->
  <circle cx="256" cy="50" r="30" fill="#FDE047" opacity="0.35"/>

  <!-- STAINED GLASS WINDOWS & ENTRANCE DOORS (JENDELA KACA PATRI & PINTU GEREJA) -->

  <!-- Steeple Window (Menara) -->
  <path d="M244 115 C244 105, 268 105, 268 115 L268 145 L244 145 Z" fill="url(#window-glow)" stroke="url(#gold-grad)" stroke-width="1.5"/>

  <!-- Central Large Arched Window (Jendela Utama Arch Gereja) -->
  <path d="M226 210 C226 180, 286 180, 286 210 L286 270 L226 270 Z" fill="url(#window-glow)" stroke="url(#gold-grad)" stroke-width="2"/>
  <!-- Window Cross Mullions -->
  <line x1="256" y1="185" x2="256" y2="270" stroke="#0F172A" stroke-width="2.5"/>
  <line x1="226" y1="230" x2="286" y2="230" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Left Wing Window -->
  <path d="M142 300 C142 290, 168 290, 168 300 L168 340 L142 340 Z" fill="url(#window-glow)" stroke="url(#gold-grad)" stroke-width="1.5"/>
  <!-- Right Wing Window -->
  <path d="M344 300 C344 290, 370 290, 370 300 L370 340 L344 340 Z" fill="url(#window-glow)" stroke="url(#gold-grad)" stroke-width="1.5"/>

  <!-- Grand Church Entrance Double Door (Pintu Utama Gereja) -->
  <path d="M222 320 C222 295, 290 295, 290 320 L290 390 L222 390 Z" fill="url(#gold-grad)"/>
  <path d="M226 323 C226 302, 286 302, 286 323 L286 390 L226 390 Z" fill="#020617"/>
  <!-- Door split line & handles -->
  <line x1="256" y1="310" x2="256" y2="390" stroke="url(#gold-grad)" stroke-width="2"/>
  <circle cx="250" cy="355" r="3" fill="url(#gold-grad)"/>
  <circle cx="262" cy="355" r="3" fill="url(#gold-grad)"/>

  <!-- BOTTOM BADGE TEXT -->
  <text x="256" y="435" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">CMS GEREJA</text>
  <text x="256" y="465" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#FCD34D" text-anchor="middle" letter-spacing="4">SYSTEM MANAJEMEN</text>
</svg>
